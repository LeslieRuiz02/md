<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Micrófono Mágico</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --light: #F7F9F9;
            --pablo: #3498DB;
            --tyrone: #E67E22;
            --uniqua: #E84393;
            --tasha: #F1C40F;
            --austin: #9B59B6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--dark);
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Pantalla de Inicio */
        #start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        .title-box h1 {
            font-size: 2.5rem;
            color: var(--primary);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            animation: bounce 2s infinite ease-in-out;
        }

        .title-box p {
            font-size: 1.2rem;
            color: var(--dark);
            margin-bottom: 30px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.4);
        }

        /* Pantalla de Juego */
        #game-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px;
            align-items: center;
            justify-content: space-between;
        }

        .header {
            width: 100%;
            text-align: center;
            padding: 10px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .status-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--dark);
            min-height: 40px;
            transition: color 0.3s;
        }

        .characters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .character {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            opacity: 0.5;
            filter: grayscale(80%);
        }

        .character.active {
            transform: scale(1.3);
            opacity: 1;
            filter: grayscale(0%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 5;
        }

        .character.active::after {
            content: '🎤';
            position: absolute;
            bottom: -5px;
            right: -5px;
            font-size: 1.5rem;
            background: white;
            border-radius: 50%;
            padding: 2px;
            animation: pulse 1s infinite;
        }

        /* Colores por personaje */
        .char-pablo.active { border: 4px solid var(--pablo); }
        .char-tyrone.active { border: 4px solid var(--tyrone); }
        .char-uniqua.active { border: 4px solid var(--uniqua); }
        .char-tasha.active { border: 4px solid var(--tasha); }
        .char-austin.active { border: 4px solid var(--austin); }

        .progress-container {
            width: 100%;
            height: 30px;
            background: #E0E0E0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.1s linear;
        }

        .player-turn {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 15px;
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .player-turn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border: none;
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: all 0.2s;
        }

        .player-turn.active .mic-button {
            cursor: pointer;
            animation: float 3s infinite ease-in-out;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--accent) 100%);
        }

        .player-turn.active .mic-button:active {
            transform: scale(0.9);
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
        }

        /* Interrupt zone to catch impatient clicks */
        #interrupt-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: none;
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s;
        }
        
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 107, 107, 0.4);
            display: none;
            z-index: 99;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Overlay for visual feedback on error -->
        <div class="feedback-overlay" id="error-overlay"></div>

        <!-- Pantalla de Inicio -->
        <div id="start-screen">
            <div class="title-box">
                <h1>🎤 El Micrófono Mágico</h1>
                <p>Aprende a escuchar a tus amigos y espera tu turno para hablar.</p>
            </div>
            <div class="characters" style="transform: scale(0.8); margin-bottom: 40px;">
                <div class="character char-pablo" style="opacity: 1; filter: grayscale(0);">🐧</div>
                <div class="character char-tyrone" style="opacity: 1; filter: grayscale(0);">🦌</div>
                <div class="character char-uniqua" style="opacity: 1; filter: grayscale(0);">🐞</div>
            </div>
            <button class="btn" id="btn-start">¡Comenzar a Jugar!</button>
        </div>

        <!-- Pantalla de Juego -->
        <div id="game-screen">
            <!-- Invisible div to catch clicks when it's not the player's turn -->
            <div id="interrupt-zone"></div>

            <div class="header" id="header">
                <div class="status-text" id="status-text">Preparando...</div>
            </div>

            <div class="characters">
                <div class="character char-pablo" id="char-0" data-name="Pablo">🐧</div>
                <div class="character char-tyrone" id="char-1" data-name="Tyrone">🦌</div>
                <div class="character char-uniqua" id="char-2" data-name="Uniqua">🐞</div>
                <div class="character char-tasha" id="char-3" data-name="Tasha">🦛</div>
                <div class="character char-austin" id="char-4" data-name="Austin">🦘</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="player-turn" id="player-turn">
                <p style="font-weight: bold; font-size: 1.2rem; color: #7f8c8d;">Mi Micrófono</p>
                <button class="mic-button" id="btn-mic">🎙️</button>
                <p style="text-align: center; font-size: 0.9rem; margin-top: 10px;" id="player-hint">Espera tu turno...</p>
            </div>
        </div>
    </div>

    <script>
        // Web Audio API para síntesis de sonido (sin usar archivos externos ni sonidos de animales)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSuccessSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Campanita (Acierto)
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        function playErrorSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Buzzer suave (Error)
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // Lógica del juego
        const startBtn = document.getElementById('btn-start');
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const playerTurnArea = document.getElementById('player-turn');
        const micBtn = document.getElementById('btn-mic');
        const interruptZone = document.getElementById('interrupt-zone');
        const playerHint = document.getElementById('player-hint');
        const errorOverlay = document.getElementById('error-overlay');
        const header = document.getElementById('header');

        let isPlayerTurn = false;
        let progressInterval;
        
        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume(); // Necesario para móviles
            startScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            nextCharacterTurn();
        });

        // Intentar tocar mientras no es el turno
        interruptZone.addEventListener('mousedown', handleInterrupt);
        interruptZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInterrupt();
        });

        function handleInterrupt() {
            if(isPlayerTurn) return;
            
            playErrorSound();
            
            // Efecto visual de error
            errorOverlay.style.display = 'block';
            header.classList.add('shake');
            const oldText = statusText.innerText;
            statusText.innerText = "¡Shh! Aún no es tu turno.";
            statusText.style.color = "var(--primary)";
            
            setTimeout(() => {
                errorOverlay.style.display = 'none';
                header.classList.remove('shake');
                statusText.innerText = oldText;
                statusText.style.color = "var(--dark)";
            }, 800);
        }

        // Cuando el jugador presiona su botón de terminar
        micBtn.addEventListener('click', () => {
            if(!isPlayerTurn) return;
            
            playSuccessSound();
            playerTurnArea.classList.remove('active');
            interruptZone.style.display = 'block';
            isPlayerTurn = false;
            
            statusText.innerText = "¡Muy bien! Escuchemos a alguien más.";
            
            setTimeout(nextCharacterTurn, 1500);
        });

        function nextCharacterTurn() {
            // Limpiar activos
            document.querySelectorAll('.character').forEach(el => el.classList.remove('active'));
            
            // Elegir un personaje al azar (0 al 4)
            const charId = Math.floor(Math.random() * 5);
            const charEl = document.getElementById(`char-${charId}`);
            const charName = charEl.getAttribute('data-name');
            
            charEl.classList.add('active');
            
            statusText.innerText = `Es el turno de ${charName}. ¡Escucha!`;
            interruptZone.style.display = 'block'; // Bloquear pantalla
            playerTurnArea.classList.remove('active');
            playerHint.innerText = "Espera tu turno...";
            
            // Iniciar barra de progreso (simula el tiempo que habla el personaje)
            let progress = 0;
            progressBar.style.width = '0%';
            progressBar.style.background = 'var(--secondary)';
            
            // Tiempo aleatorio de habla entre 4 y 6 segundos
            const talkTime = 4000 + Math.random() * 2000; 
            const updateInterval = 50; // actualizar cada 50ms
            const step = (updateInterval / talkTime) * 100;
            
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                progress += step;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(progressInterval);
                    finishCharacterTurn();
                }
                progressBar.style.width = `${progress}%`;
            }, updateInterval);
        }

        function finishCharacterTurn() {
            document.querySelectorAll('.character').forEach(el => el.classList.remove('active'));
            progressBar.style.width = '100%';
            progressBar.style.background = 'var(--primary)';
            
            // Es el turno del jugador
            isPlayerTurn = true;
            interruptZone.style.display = 'none'; // Liberar pantalla
            
            statusText.innerText = "¡Tu turno! Puedes hablar.";
            playerTurnArea.classList.add('active');
            playerHint.innerText = "Toca el micrófono cuando termines de hablar";
        }

    </script>
</body>
</html>
